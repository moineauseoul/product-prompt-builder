<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Prompt Builder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff' stroke='%23e5e7eb' stroke-width='4'/><text x='50' y='68' font-size='58' font-family='sans-serif' font-weight='700' fill='%23111827' text-anchor='middle'>P</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --accent:       #111827;
      --accent-hover: #000000;
      --accent-light: #f3f4f6;
      --accent-border:#9ca3af;
      --success:      #111827;
      --success-bg:   #f9fafb;
      --success-border:#d1d5db;
      --danger:       #ef4444;
      --danger-bg:    #fef2f2;
      --danger-border:#fecaca;
      --radius: 8px;
    }

    html { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans', 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: var(--gray-900);
      background: #f0efed;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0; }
    header .badge {
      font-size: 10px; font-weight: 600;
      color: var(--gray-500); background: var(--gray-100);
      padding: 2px 7px; border-radius: 20px;
      border: 1px solid var(--gray-200);
    }

    /* ── Header API Dropdown ── */
    .api-dropdown-wrap {
      margin-left: auto;
      position: relative;
    }
    .api-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      background: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      transition: border-color .15s;
      white-space: nowrap;
    }
    .api-toggle-btn:hover { border-color: var(--gray-400); }
    .api-header-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gray-300);
      flex-shrink: 0;
    }
    .api-header-dot.saved { background: #16a34a; }
    .api-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 280px;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.09);
      z-index: 200;
    }
    .api-dropdown.open { display: block; }
    .api-dropdown-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: .4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── Main content — 2컬럼 그리드, 전체 높이 ── */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 100%;
      height: calc(100vh - 52px - 120px);
      overflow: hidden;
      padding: 24px 48px;
      background: #ffffff;
      border-radius: 16px;
      margin: 60px 180px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── 좌우 컬럼 ── */
    .col-left {
      height: 100%;
      overflow: hidden;
      padding: 20px 24px;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .col-left > .content-section {
      flex: 1;
      min-height: 0;
    }

    .col-right {
      height: 100%;
      overflow: hidden;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* 상품정보·촬영설정은 고정, 프롬프트 카드는 나머지 채움 */
    .col-right > .content-section { flex-shrink: 0; }
    .col-right > .content-section:last-child { flex: 1; min-height: 0; }

    /* ── Content sections — 카드 스타일 제거, 구분은 제목으로 ── */
    .content-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
      margin-bottom: 0;
    }

    /* ── Section heading (카드 상단 대표 제목) ── */
    .section-heading {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-900);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-100);
      margin-bottom: 2px;
    }
    /* 제목 + 우측 버튼 행 */
    .section-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-100);
      margin-bottom: 2px;
    }
    .section-heading-row .section-heading {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    /* ── Section sub-titles ── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── 2-col field row ── */
    .field-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── Image Upload ── */
    .upload-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
      border-radius: var(--radius);
      transition: background .15s, box-shadow .15s;
    }
    .upload-area.drag-over {
      background: var(--gray-100);
      box-shadow: 0 0 0 6px var(--gray-100);
    }
    /* mainSection — 높이를 채우도록 flex column */
    .upload-area > div:first-child {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .slot-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    /* 메인 슬롯 — 남은 높이를 꽉 채움 */
    .upload-slot-main { position: relative; width: 100%; flex: 1; min-height: 0; }
    .upload-slot-main > label { min-height: unset; }
    .upload-slot-main:has(.thumb-wrap.has-image) > label { display: none; }
    .upload-slot-main .thumb-wrap { position: absolute; inset: 0; }
    .upload-slot-main .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      background-color: var(--gray-50);
      border-radius: var(--radius);
      border: 1.5px solid var(--gray-200);
    }
    .upload-slot-main .thumb-wrap .del-btn { position: absolute; top: 4px; right: 4px; }
    /* 디테일 슬롯 목록 — 2×2 그리드, 높이 채움 */
    .upload-detail-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }
    /* 각 디테일 셀 — 세로 배치 (썸네일 위, 인풋 아래) */
    .slot-detail-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 0;
    }
    .slot-detail-thumb-col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; }
    /* 디테일 슬롯 — 높이 채움 */
    .upload-slot-detail { position: relative; width: 100%; flex: 1; min-height: 0; }

    /* 공통 upload-slot */
    .upload-slot label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      border: 1.5px dashed var(--gray-300);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--gray-400);
      font-size: 11px;
      gap: 4px;
      transition: border-color .15s, background .15s;
    }
    .upload-slot label:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .upload-slot input[type="file"] { display: none; }
    .thumb-wrap { position: absolute; inset: 0; display: none; }
    .thumb-wrap.has-image { display: block; }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1.5px solid var(--gray-200);
    }
    .thumb-wrap .del-btn {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px;
      transition: background .15s;
    }
    .thumb-wrap .del-btn:hover { background: var(--danger); }

    /* 디테일 참고 입력 */
    .detail-ref-input {
      width: 100%;
      padding: 5px 8px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 11px;
      color: var(--gray-900);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .detail-ref-input:focus { border-color: var(--accent); }
    .detail-ref-input::placeholder { color: var(--gray-400); }

    /* Analysis */
    .upload-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .upload-count { font-size: 12px; color: var(--gray-400); }
    .analysis-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .analysis-range {
      display: flex;
      gap: 5px;
    }
    /* 라디오 입력 숨김 — 시각적으로 chip 토글 */
    .analysis-range input[type="radio"] { display: none; }
    .analysis-range label {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      background: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      user-select: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .analysis-range label:hover { border-color: var(--accent); color: var(--accent); }
    .analysis-range label:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .analysis-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid transparent;
    }
    .analysis-banner.loading { display: flex; background: var(--accent-light); color: var(--accent); border-color: var(--accent-border); }
    .analysis-banner.success { display: flex; background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
    .analysis-banner.error   { display: flex; background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }

    /* ── Form fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 500; color: var(--gray-700); }
    .field input[type="text"],
    .field textarea,
    .field input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      color: var(--gray-900);
      background: #fff;
      outline: none;
      transition: border-color .15s, background .15s, color .15s;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: var(--gray-400); }
    .field input.analyzing,
    .field textarea.analyzing {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-light);
      font-style: italic;
      cursor: not-allowed;
    }

    /* ── Hex input ── */
    .hex-input {
      width: 100px;
      padding: 6px 10px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 12px;
      color: var(--gray-900);
      outline: none;
      transition: border-color .15s;
    }
    .hex-input:focus { border-color: var(--accent); }
    .hex-input::placeholder { color: var(--gray-400); }

    /* ── Chip buttons ── */
    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 6px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      background: #fff;
      font-family: inherit; font-size: 13px;
      color: var(--gray-700);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── Color chips ── */
    .color-chip {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
      outline: none;
      flex-shrink: 0;
    }
    .color-chip:hover { transform: scale(1.1); }
    .color-chip.active { border-color: var(--gray-900); transform: scale(1.1); }
    .color-chip[data-value="white"]      { background: #ffffff; box-shadow: inset 0 0 0 1px var(--gray-300); }
    .color-chip[data-value="light-gray"] { background: #e5e7eb; }
    .color-chip[data-value="soft-gray"]  { background: #f5f5f5; box-shadow: inset 0 0 0 1px var(--gray-300); }

    /* ── Checkbox options (2-col) ── */
    .check-group { display: flex; flex-wrap: nowrap; gap: 16px; width: 100%; justify-content: space-between; }
    .check-item {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 13px; color: var(--gray-700);
      user-select: none; white-space: nowrap;
    }
    .check-item input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-outline { background: #fff; color: var(--gray-700); border: 1.5px solid var(--gray-200); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-outline:disabled { opacity: .5; cursor: not-allowed; }
    .btn-small { padding: 5px 10px; font-size: 11px; }

    /* ── Prompt area ── */
    .prompt-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #prompt-output {
      width: 100%;
      flex: 1;
      min-height: 120px;
      overflow-y: auto;
      padding: 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.7;
      color: var(--gray-700);
      background: var(--gray-50);
      resize: none;
      outline: none;
      transition: border-color .15s;
    }
    #prompt-output:focus { border-color: var(--accent); }
    .prompt-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .prompt-status {
      font-size: 12px;
      color: var(--gray-400);
    }
    .prompt-status.error { color: var(--danger); }
    .prompt-status.success { color: var(--success); }
    .copy-toast { font-size: 12px; color: var(--success); opacity: 0; transition: opacity .3s; margin-right: 6px; }
    .copy-toast.show { opacity: 1; }

    /* ── Category toast ── */
    #cat-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #111827;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s, transform .22s;
      z-index: 9999;
      white-space: nowrap;
    }
    #cat-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── API Key (inside dropdown) ── */
    .api-key-status { display: flex; align-items: center; gap: 4px; font-size: 11px; margin-top: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray-300); }
    .status-dot.saved { background: #16a34a; }
    .api-key-status span { color: var(--gray-500); }
    .eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); padding: 2px; display: flex;
    }
    .eye-btn:hover { color: var(--gray-700); }
    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 36px; }

    /* ── Segment control (대분류) ── */
    .segment-group {
      display: inline-flex;
      width: 100%;
      background: #ffffff;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 3px;
      gap: 0;
    }
    .segment-btn {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-right: 1px solid #e5e7eb;
      border-radius: 0;
      background: #ffffff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      text-align: center;
    }
    .segment-btn:last-child { border-right: none; }
    .segment-btn:hover { color: var(--gray-900); }
    .segment-btn.active {
      background: #111827;
      color: #ffffff;
      border-radius: 8px;
      border-right: none;
    }
    .segment-btn.active + .segment-btn { border-left: none; }

    /* ── Category sub-group slide ── */
    #category-sub-wrap {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.2s ease, opacity 0.15s ease, margin-top 0.2s ease;
      margin-top: 0;
    }
    #category-sub-wrap.visible {
      max-height: 80px;
      opacity: 1;
      margin-top: 8px;
    }

    /* ── Category tertiary-group slide ── */
    #category-tertiary-wrap {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.2s ease, opacity 0.15s ease, margin-top 0.2s ease;
      margin-top: 0;
    }
    #category-tertiary-wrap.visible {
      max-height: 80px;
      opacity: 1;
      margin-top: 6px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 10px; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="16" fill="#111827"/>
    <text x="50" y="68" font-size="58" font-family="sans-serif" font-weight="700" fill="#ffffff" text-anchor="middle">P</text>
  </svg>
  <h1>Product Prompt Builder</h1>
  <span class="badge">Beta</span>

  <!-- API 설정 드롭다운 -->
  <div class="api-dropdown-wrap" id="api-dropdown-wrap">
    <button class="api-toggle-btn" id="api-toggle-btn">
      <span class="api-header-dot" id="api-header-dot"></span>
      API 설정
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6,9 12,15 18,9"/>
      </svg>
    </button>
    <div class="api-dropdown" id="api-dropdown">
      <p class="api-dropdown-label">Claude API Key</p>
      <div class="field">
        <div class="input-wrap">
          <input type="password" id="claude-key" placeholder="sk-ant-..." autocomplete="off" />
          <button class="eye-btn" data-target="claude-key" aria-label="보기">

<script>
/* ═══════════════════════════════════════════════
   1. 상수 / 매핑 테이블
═══════════════════════════════════════════════ */
const MAX_IMAGES = 5;

const FIELD_PLACEHOLDERS = {
  material:    '예: 100% 린넨, 울 혼방, 가죽...',
  detail:      '예: 오버핏, 드롭숄더, 사이드 슬릿, 자수 로고...',
  'color-text':'예: 오프화이트, 버건디, 네이비...',
};

const CUT_VIEW = {
  'front':         'Front',
  'back':          'Back',
  'three-quarter': 'Three-quarter',
  'detail':        'Detail close-up',
};

const BG_HEX = {
  'white':      '#ffffff',
  'light-gray': '#efefef',
  'soft-gray':  '#f5f5f5',
};

const SUB_CATEGORIES = {
  'bag':       [{ value: 'bag-leather', label: '가죽' }, { value: 'bag-fabric', label: '패브릭' }, { value: 'bag-fur', label: '퍼·페더' }],
  'clothing':  [{ value: 'outer', label: '아우터' }, { value: 'top', label: '상의' }, { value: 'pants', label: '바지' }, { value: 'skirt', label: '스커트' }, { value: 'dress', label: '드레스' }],
  'accessory': [],
};

const TERTIARY_CATEGORIES = {
  'bag-leather': [
    { value: 'glossy',      label: '유광' },
    { value: 'semi-glossy', label: '세미글로시' },
    { value: 'matte',       label: '무광' },
    { value: 'suede',       label: '스웨이드' },
    { value: 'nubuck',      label: '누벅' },
  ],
  'bag-fabric': [
    { value: 'nylon',       label: '나일론' },
    { value: 'canvas',      label: '캔버스' },
    { value: 'cotton',      label: '면(코튼)' },
    { value: 'mesh',        label: '메쉬' },
    { value: 'eco',         label: '에코(비건)' },
  ],
  'bag-fur': [
    { value: 'fur',         label: '퍼(fur)' },
    { value: 'feather',     label: '페더(feather)' },
  ],
};

/* ═══════════════════════════════════════════════
   2. 이미지 슬롯 초기화
═══════════════════════════════════════════════ */
const uploadArea       = document.getElementById('upload-area');
const imgCountEl       = document.getElementById('img-count');
const analyzeBtn       = document.getElementById('analyze-btn');
const analysisScopeEls = document.querySelectorAll('input[name="analysis-scope"]');
const images           = new Array(MAX_IMAGES).fill(null);
let translationCache   = null;

function updateCount() {
  imgCountEl.textContent = images.filter(Boolean).length;
  updateAnalyzeControls();
}

function updateAnalyzeControls(isAnalyzing = false) {
  analyzeBtn.disabled = !Boolean(images[0]) || isAnalyzing;
  analysisScopeEls.forEach(input => { input.disabled = isAnalyzing; });
}

function getAnalysisScope() {
  return document.querySelector('input[name="analysis-scope"]:checked')?.value || 'primary';
}

function getSlotReference(index) {
  if (index === 0) return '[IMPORTANT CONTEXT - Primary full product image]';
  const label = document.getElementById(`detail-ref-${index}`)?.value.trim() || `Detail reference image from slot ${index + 1}`;
  return `[IMPORTANT CONTEXT - ${label}]`;
}

function getAnalysisItems() {
  if (getAnalysisScope() === 'primary') {
    return images[0] ? [{ ...images[0], index: 0, note: getSlotReference(0) }] : [];
  }
  return images
    .map((item, index) => item ? { ...item, index, note: getSlotReference(index) } : null)
    .filter(Boolean);
}

async function analyzeCurrentImages() {
  const items = getAnalysisItems();
  if (!items.length) {
    showBanner('error', '분석할 이미지를 먼저 업로드해 주세요.');
    setTimeout(hideBanner, 3000);
    return;
  }
  await analyzeImageWithClaude(items);
}

async function setImageAtSlot(index, file) {
  if (images[index]?.url) URL.revokeObjectURL(images[index].url);
  const url = URL.createObjectURL(file);
  images[index] = { file, url };
  document.getElementById(`thumb-img-${index}`).src = url;
  document.getElementById(`thumb-${index}`).classList.add('has-image');
  updateCount();
  saveImages();
}

async function addDroppedImages(fileList) {
  const files = [...fileList].filter(f => f.type.startsWith('image/'));
  if (!files.length) {
    showBanner('error', '이미지 파일만 업로드할 수 있습니다.');
    setTimeout(hideBanner, 3000);
    return;
  }
  let added = 0;
  for (const file of files) {
    const index = images.findIndex(item => !item);
    if (index === -1) break;
    await setImageAtSlot(index, file);
    added++;
  }
  if (added < files.length) {
    showBanner('error', '이미지는 최대 5장까지 업로드할 수 있습니다.');
    setTimeout(hideBanner, 3000);
  }
}

const UPLOAD_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`;

const DETAIL_PLACEHOLDERS = [
  '자수 로고 디테일 참고',
  '금속 로고 장식 참고',
  '원단 텍스처 / 주름 참고',
  '봉제 / 마감 디테일 참고',
];

function createUploadSlot(i) {
  const slot = document.createElement('div');
  slot.className = 'upload-slot';
  slot.innerHTML = `
    <label for="img-input-${i}">${UPLOAD_SVG}</label>
    <input type="file" id="img-input-${i}" accept="image/*" />
    <div class="thumb-wrap" id="thumb-${i}">
      <img id="thumb-img-${i}" src="" alt="미리보기 ${i + 1}" />
      <button class="del-btn" data-index="${i}" title="삭제">✕</button>
    </div>
  `;
  slot.querySelector(`#img-input-${i}`).addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await setImageAtSlot(i, file);
    e.target.value = '';
  });
  slot.querySelector('.del-btn').addEventListener('click', () => {
    if (images[i]?.url) URL.revokeObjectURL(images[i].url);
    images[i] = null;
    document.getElementById(`thumb-${i}`).classList.remove('has-image');
    document.getElementById(`thumb-img-${i}`).src = '';
    updateCount();
    saveImages();
  });
  return slot;
}

/* 슬롯 1 — 메인 */
const mainSection = document.createElement('div');
const mainLbl = document.createElement('p');
mainLbl.className = 'slot-label';
mainLbl.textContent = '메인 이미지';
const mainSlot = createUploadSlot(0);
mainSlot.classList.add('upload-slot-main');
mainSection.appendChild(mainLbl);
mainSection.appendChild(mainSlot);
uploadArea.appendChild(mainSection);

/* 슬롯 2~5 — 디테일 */
const detailSection = document.createElement('div');
detailSection.className = 'upload-detail-section';

for (let i = 1; i < MAX_IMAGES; i++) {
  const row = document.createElement('div');
  row.className = 'slot-detail-row';

  const thumbCol = document.createElement('div');
  thumbCol.className = 'slot-detail-thumb-col';
  const lbl = document.createElement('p');
  lbl.className = 'slot-label';
  lbl.textContent = `디테일 ${i}`;
  const detailSlot = createUploadSlot(i);
  detailSlot.classList.add('upload-slot-detail');
  thumbCol.appendChild(lbl);
  thumbCol.appendChild(detailSlot);

  const refInput = document.createElement('input');
  refInput.type = 'text';
  refInput.id = `detail-ref-${i}`;
  refInput.className = 'detail-ref-input';
  refInput.placeholder = DETAIL_PLACEHOLDERS[i - 1];

  row.appendChild(thumbCol);
  row.appendChild(refInput);
  detailSection.appendChild(row);
}

uploadArea.appendChild(detailSection);

['dragenter', 'dragover'].forEach(ev => {
  uploadArea.addEventListener(ev, (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
});
['dragleave', 'drop'].forEach(ev => {
  uploadArea.addEventListener(ev, (e) => { e.preventDefault(); uploadArea.classList.remove('drag-over'); });
});
uploadArea.addEventListener('drop', async (e) => { await addDroppedImages(e.dataTransfer.files); });

analyzeBtn.addEventListener('click', async () => {
  if (!_activeMajor) {
    showCatToast('카테고리를 먼저 선택해주세요');
    return;
  }
  if (!images[0]?.file) {
    showBanner('error', '먼저 첫 번째 슬롯에 이미지를 업로드해 주세요.');
    setTimeout(hideBanner, 3000);
    return;
  }
  await analyzeCurrentImages();
});

/* ═══════════════════════════════════════════════
   3. 칩 / 컬러칩 선택
═══════════════════════════════════════════════ */
function bindSingleChip(groupId) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      saveState();
    });
  });
}
bindSingleChip('cut-group');

/* ── 카테고리 대분류/소분류/3차 ── */
let _activeMajor    = '';
let _activeMinor    = '';
let _sheenLevel     = ''; // 가죽 광택 레벨: full_matte / semi_matte / semi_glossy / high_gloss
let _activeTertiary = ''; // 3차 분류 선택값 (대분류/소분류 변경 시 초기화)

function getActiveCategory() {
  if (_activeMajor === 'accessory') return 'accessory';
  return _activeMinor || '';
}

function renderSubGroup(major) {
  const subWrap  = document.getElementById('category-sub-wrap');
  const subGroup = document.getElementById('category-sub-group');
  const subs = SUB_CATEGORIES[major] || [];
  subGroup.innerHTML = '';
  _activeMinor    = '';
  _activeTertiary = '';
  document.getElementById('category-tertiary-wrap').classList.remove('visible');
  if (!subs.length) {
    subWrap.classList.remove('visible');
    return;
  }
  subs.forEach(({ value, label }) => {
    const btn = document.createElement('button');
    btn.className     = 'chip';
    btn.dataset.value = value;
    btn.textContent   = label;
    btn.addEventListener('click', () => {
      subGroup.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _activeMinor = value;
      renderTertiaryGroup(value);
      saveState();
    });
    subGroup.appendChild(btn);
  });
  subWrap.classList.add('visible');
}

function renderTertiaryGroup(minor) {
  const tertiaryWrap  = document.getElementById('category-tertiary-wrap');
  const tertiaryGroup = document.getElementById('category-tertiary-group');
  const options = TERTIARY_CATEGORIES[minor] || [];
  tertiaryGroup.innerHTML = '';
  _activeTertiary = '';
  if (!options.length) {
    tertiaryWrap.classList.remove('visible');
    return;
  }
  options.forEach(({ value, label }) => {
    const btn = document.createElement('button');
    btn.className     = 'chip';
    btn.dataset.value = value;
    btn.textContent   = label;
    btn.addEventListener('click', () => {
      if (btn.classList.contains('active')) {
        btn.classList.remove('active');
        _activeTertiary = '';
      } else {
        tertiaryGroup.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _activeTertiary = value;
      }
      saveState();
    });
    tertiaryGroup.appendChild(btn);
  });
  tertiaryWrap.classList.add('visible');
}

document.getElementById('category-main-group').querySelectorAll('.segment-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('category-main-group').querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _activeMajor = btn.dataset.value;
    _sheenLevel  = '';
    renderSubGroup(_activeMajor);
    saveState();
  });
});

document.getElementById('bg-group').querySelectorAll('.color-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('bg-group').querySelectorAll('.color-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('custom-bg').value = '';
    saveState();
  });
});

document.getElementById('custom-bg').addEventListener('input', (e) => {
  if (e.target.value.trim()) {
    document.getElementById('bg-group').querySelectorAll('.color-chip').forEach(b => b.classList.remove('active'));
  }
});

/* ═══════════════════════════════════════════════
   4. 눈 아이콘 토글
═══════════════════════════════════════════════ */
document.querySelectorAll('.eye-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = document.getElementById(btn.dataset.target);
    target.type = target.type === 'password' ? 'text' : 'password';
  });
});

/* ═══════════════════════════════════════════════
   5. API 키 — localStorage
═══════════════════════════════════════════════ */
function loadKeys() {
  const ck = localStorage.getItem('claude_api_key') || '';
  document.getElementById('claude-key').value = ck;

   9. 이미지 → base64
═══════════════════════════════════════════════ */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analyzeImageWithClaude(items) {
  const apiKey = localStorage.getItem('claude_api_key');
  if (!apiKey) {
    showBanner('error', 'Claude API 키를 먼저 저장해 주세요.');
    setTimeout(hideBanner, 3000);
    return;
  }

  setFieldsAnalyzing(true);
  showBanner('loading', `Claude AI가 이미지 ${items.length}장을 분석 중입니다...`);

  try {
    const imageContent = [];
    for (const item of items) {
      const base64 = await fileToBase64(item.file);
      const mediaType = item.file.type || 'image/jpeg';
      imageContent.push({ type: 'text', text: `Slot ${item.index + 1}: ${item.note}` });
      imageContent.push({ type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } });
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        system: buildAnalysisSystemPrompt(),
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: 'Analyze these product images and consolidate the result.' },
            ...imageContent,
          ],
        }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 오류 (${res.status})`);
    }

    const data  = await res.json();
    const text  = data.content?.[0]?.text || '';
    const raw   = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) {
      console.error('[분석 원본 응답]', text);
      throw new Error('분석 결과를 파싱할 수 없습니다.');
    }

    const result = JSON.parse(match[0]);

    // 3차 분류 선택값에 따른 소재 prefix 매핑
    const TERTIARY_MATERIAL_PREFIX = {
      'glossy':      '[유광 가죽] ',
      'semi-glossy': '[세미글로시 가죽] ',
      'matte':       '[무광 가죽] ',
      'suede':       '[스웨이드] ',
      'nubuck':      '[누벅] ',
      'nylon':       '[나일론 / 가죽 아님] ',
      'canvas':      '[캔버스] ',
      'cotton':      '[면(코튼)] ',
      'mesh':        '[메쉬] ',
      'eco':         '[에코 / 가죽 아님] ',
      'fur':         '[퍼(fur)] ',
      'feather':     '[페더(feather)] ',
    };
    const tertiaryPrefix  = TERTIARY_MATERIAL_PREFIX[_activeTertiary] || '';
    const rawMaterial     = result.material || '';
    const materialValue   = tertiaryPrefix ? `${tertiaryPrefix}${rawMaterial}` : rawMaterial;

    // 3차 분류가 유광/세미글로시이면 컬러 텍스트에서 무광 관련 단어 제거
    const isGlossyTertiary = _activeTertiary === 'glossy' || _activeTertiary === 'semi-glossy';
    const rawColor = result.color || '';
    const colorValue = isGlossyTertiary
      ? rawColor.replace(/무광|매트|matte/gi, '').replace(/\s{2,}/g, ' ').replace(/^[\s,\/]+|[\s,\/]+$/g, '').trim()
      : rawColor;

    document.getElementById('material').value   = materialValue;
    document.getElementById('detail').value     = result.details || '';
    document.getElementById('color-text').value = colorValue;
    _sheenLevel      = result.sheen_level || '';
    translationCache = null;

    showBanner('success', '분석 완료! 필드가 자동으로 채워졌습니다.');
    setTimeout(hideBanner, 2500);

  } catch (err) {
    console.error('[Claude 분석 오류]', err);
    showBanner('error', `분석 실패: ${err.message}`);
    setTimeout(hideBanner, 4000);
  } finally {
    setFieldsAnalyzing(false);
  }
}

async function translatePromptFieldsToEnglish(values) {
  const sourceKey = JSON.stringify(values);
  if (translationCache?.sourceKey === sourceKey) return translationCache.values;

  const apiKey = localStorage.getItem('claude_api_key');
  if (!apiKey) throw new Error('Claude API 키를 먼저 저장해 주세요.');

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 300,
      system: `Translate Korean fashion product attributes into concise English phrases for an image generation prompt.
Respond in JSON only: {"material": "", "details": "", "color": ""}`,
      messages: [{
        role: 'user',
        content: [{ type: 'text', text: `material: ${values.material}\ndetails: ${values.detail}\ncolor: ${values.color}` }],
      }],
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `영문 변환 오류 (${res.status})`);
  }

  const data  = await res.json();
  const text  = data.content?.[0]?.text || '';
  const cleaned = text.replace(/```json|```/g, '').trim();
  const match = cleaned.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('영문 변환 결과를 파싱할 수 없습니다.');

  const result = JSON.parse(match[0]);
  const translated = {
    material: result.material || values.material,
    detail:   result.details  || values.detail,
    color:    result.color    || values.color,
  };
  translationCache = { sourceKey, values: translated };
  return translated;
}

    const retouchLine = isAnyGlossy
      ? isGlossy
        ? `Retouch to enhance leather surface quality. Actively render glossy leather finish with strong specular highlights on handle top, body curves, and edge contours. The surface must NOT appear flat or matte.`
        : `Retouch to enhance leather surface quality. Render semi-glossy leather finish with soft natural highlights on curves and edges. The surface must NOT appear flat or matte.`
      : `Lightly retouch the bag: remove only major wrinkles and obvious deformations. Preserve natural leather/fabric character and subtle surface variations — maintain the bag's natural softness and volume, do not over-perfect or flatten the shape. Straighten and smooth out the handles — clean, taut, and naturally curved without kinks or bends.`;

    const importantLine = isGlossy
      ? `IMPORTANT: This is a HIGH-GLOSS leather bag. Strong specular highlights and mirror-like sheen must be rendered clearly. Do NOT render as matte.`
      : isSemiGlossy
      ? `IMPORTANT: This is a SEMI-GLOSSY leather bag. Subtle natural sheen and soft highlights must be visible. Do NOT render as matte or flat.`
      : null;

    const finishNote = isMatte  ? 'matte finish, no sheen, no specular highlights'
                     : isSuede  ? 'suede texture, velvety matte surface, no sheen, soft nap texture'
                     : isNubuck ? 'nubuck texture, fine matte surface, subtle dry texture, no gloss'
                     : '';
    const materialLine = finishNote
      ? `Material: ${material} (${finishNote}). Color: ${color}. Key details: ${values.detail}.`
      : `Material: ${material}. Color: ${color}. Key details: ${values.detail}.`;

    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered composition. No mannequin, no model, no hands, no props.`,
      retouchLine,
      `Relight with soft, even studio lighting. Subtle natural shadow beneath the product only.`,
      ...(importantLine ? [importantLine] : []),
      materialLine,
      `Preserve exact product shape, proportions, and leather texture accurately. Enhance leather surface quality — show realistic natural sheen, soft highlights, and smooth grain texture. Preserve the original leather finish (glossy/semi-glossy/matte) exactly as shown in the reference image.`,
      `Ensure logo and hardware remain sharp and clearly readable.`,
      `Clean e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      ...extras,
    ];

  } else if (category === 'bag-fabric') {
    const FABRIC_NOTES = {
      'nylon':  'nylon fabric, NOT leather, lightweight synthetic material, subtle sheen from weave',
      'canvas': 'canvas fabric, structured woven texture, matte surface',
      'cotton': 'cotton fabric, soft matte texture, natural weave',
      'mesh':   'mesh fabric, open weave structure, lightweight',
      'eco':    'vegan leather / eco material, NOT genuine leather',
    };
    const fabricNote       = FABRIC_NOTES[_activeTertiary] || '';
    const notLeatherSuffix = (_activeTertiary === 'nylon' || _activeTertiary === 'eco') ? ' (가죽 아님)' : '';
    const fabricMaterialLine = fabricNote
      ? `Material: ${material}${notLeatherSuffix}. ${fabricNote}. Color: ${color}. Key details: ${values.detail}.`
      : `Material: ${material}. Color: ${color}. Key details: ${values.detail}.`;
    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered composition. No mannequin, no model, no hands, no props.`,
      `Lightly retouch the bag: remove only major wrinkles and obvious deformations. Preserve natural leather/fabric character and subtle surface variations — maintain the bag's natural softness and volume, do not over-perfect or flatten the shape. Straighten and smooth out the handles — clean, taut, and naturally curved without kinks or bends.`,
      `Relight with soft, even studio lighting. Subtle natural shadow beneath the product only.`,
      fabricMaterialLine,
      `Preserve exact product shape and proportions. Emphasize the woven fabric texture and material character accurately — not leather, show the actual fabric grain and weave pattern.`,
      `Ensure logo and hardware remain sharp and clearly readable.`,
      `Preserve the exact position of all hardware, charms, and accessories as shown in the reference image. Do not relocate any hardware elements to different sides or positions.`,
      `Clean e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      ...extras,
    ];

  } else if (category === 'bag-fur') {
    lines = [
      `Product retouching shot for e-commerce. Remove the existing background completely and replace with a solid ${bg} background.`,
      `${cutView} view, centered composition. No mannequin, no model, no hands, no props.`,
      `Minimal retouching only — do NOT flatten or smooth the fur/feather texture. Preserve all volume, fluffiness, and natural movement of the fur or feathers.`,
      `Relight with soft, even studio lighting to show depth and volume of the fur/feather material.`,
      `Material: ${material}. Color: ${color}. Key details: ${values.detail}.`,
      `Preserve exact product shape and the natural voluminous texture of the fur/feather material.`,
      `Ensure logo and hardware remain sharp and clearly readable.`,
      `Clean e-commerce product shot. No stylization, no artistic effects, no color distortion.`,
      ...extras,
    ];

  } else {
    /* 악세 */
    lines = [
      `Remove the existing background completely and replace with a solid ${bg} background.`,
      `Keep the product exactly as shown, ${cutView} view, centered composition.`,
      `Relight with soft, even studio lighting. Subtle shadow beneath the product only.`,
      `Material: ${material}. Color: ${color}. Key details: ${values.detail}.`,
      `Preserve exact product shape, proportions, surface texture, and logo detail accurately.`,
      `Ensure logo remains sharp and clearly readable.`,
      `Clean e-commerce product shot. No stylization, no artistic effects.`,
      ...extras,
    ];
  }

  return lines.join('\n');
}

document.getElementById('generate-btn').addEventListener('click', async () => {
  const missing = validatePromptInputs();
  if (missing.length) {
    setCopyEnabled(false);
    setPromptStatus(missing[0], 'error');
    return;
  }

  const generateBtn = document.getElementById('generate-btn');
  generateBtn.disabled = true;
  setCopyEnabled(false);
  setPromptStatus('한글 입력값을 영문 프롬프트용으로 변환 중입니다...', '');

  try {
    const translated = await translatePromptFieldsToEnglish(getPromptSourceValues());
    document.getElementById('prompt-output').value = buildPrompt(translated);
    setCopyEnabled(true);
    setPromptStatus('영문 프롬프트가 생성되었습니다.', 'success');
    saveState();
  } catch (err) {
    setPromptStatus(`프롬프트 생성 실패: ${err.message}`, 'error');
  } finally {
    generateBtn.disabled = false;
  }
});

/* ═══════════════════════════════════════════════
   12. 복사 버튼
═══════════════════════════════════════════════ */
document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('prompt-output').value;
  if (!text) {
    setPromptStatus('복사할 프롬프트가 없습니다.', 'error');
    setCopyEnabled(false);
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
    setPromptStatus('프롬프트가 복사되었습니다.', 'success');
  });
});

/* ═══════════════════════════════════════════════
   13. 전체 초기화
═══════════════════════════════════════════════ */
function resetAll() {
  for (let i = 0; i < MAX_IMAGES; i++) {
    if (images[i]?.url) URL.revokeObjectURL(images[i].url);
    images[i] = null;
    document.getElementById(`thumb-${i}`)?.classList.remove('has-image');
    const img = document.getElementById(`thumb-img-${i}`);
    if (img) img.src = '';
  }
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById(`detail-ref-${i}`);
    if (el) el.value = '';
  }
  ['material', 'detail', 'color-text'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('custom-bg').value = '';
  document.getElementById('prompt-output').value = '';
  _activeMajor    = '';
  _activeMinor    = '';
  _sheenLevel     = '';
  _activeTertiary = '';
  document.querySelectorAll('#category-main-group .segment-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('category-sub-wrap').classList.remove('visible');
  document.getElementById('category-tertiary-wrap').classList.remove('visible');
  document.querySelectorAll('#cut-group .chip').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#bg-group .color-chip').forEach(b => b.classList.remove('active'));
  localStorage.removeItem('ppb_state');
  clearSavedImages();
  translationCache = null;
  updateCount();
  setCopyEnabled(false);
  setPromptStatus('소재, 디테일, 컬러를 입력한 뒤 프롬프트를 생성하세요.');
  hideBanner();
}
document.getElementById('reset-all-btn').addEventListener('click', resetAll);

/* ═══════════════════════════════════════════════
   14. 상태 저장 / 복원 (localStorage)
═══════════════════════════════════════════════ */
const LS_STATE = 'ppb_state';

/* ── IndexedDB for images (localStorage quota-safe) ── */
const IDB_NAME    = 'ppb_db';
const IDB_STORE   = 'images';
const IDB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      if (!e.target.result.objectStoreNames.contains(IDB_STORE))
        e.target.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

let _saveTimer = null;
function debouncedSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveState, 500);
}

function saveState() {
  try {
    const state = {
      material:   document.getElementById('material').value,
      detail:     document.getElementById('detail').value,
      color:      document.getElementById('color-text').value,
      detailRefs: [1,2,3,4].map(i => document.getElementById(`detail-ref-${i}`)?.value || ''),
      extras:     [...document.querySelectorAll('.extra-opt')].map(cb => cb.checked),
      prompt:     document.getElementById('prompt-output').value,
    };
    localStorage.setItem(LS_STATE, JSON.stringify(state));
  } catch (_) {}
}

async function saveImages() {
  try {
    const db = await openDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    for (let i = 0; i < MAX_IMAGES; i++) {
      if (images[i]?.file) store.put(images[i].file, i);
      else                  store.delete(i);
    }
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
  } catch (err) { console.warn('[saveImages]', err); }
}

async function clearSavedImages() {
  try {
    const db = await openDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).clear();
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
  } catch (_) {}
}

function _restoreChip(groupId, value) {
  if (!value) return;
  document.querySelectorAll(`#${groupId} .chip`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.value === value);
  });
}

function _restoreColorChip(value) {
  if (!value) return;
  document.querySelectorAll('#bg-group .color-chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.value === value);
  });
}

async function restoreImages() {
  try {
    const db    = await openDB();
    const tx    = db.transaction(IDB_STORE, 'readonly');
    const store = tx.objectStore(IDB_STORE);
    const keys  = await new Promise((res, rej) => {
      const r = store.getAllKeys();
      r.onsuccess = e => res(e.target.result);
      r.onerror   = e => rej(e.target.error);
    });
    for (const i of keys) {
      if (i < 0 || i >= MAX_IMAGES) continue;
      const file = await new Promise((res, rej) => {
        const r = store.get(i);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      });
      if (!file) continue;
      if (images[i]?.url) URL.revokeObjectURL(images[i].url);
      const url = URL.createObjectURL(file);
      images[i] = { file, url };
      document.getElementById(`thumb-img-${i}`).src = url;
      document.getElementById(`thumb-${i}`).classList.add('has-image');
    }
  } catch (err) { console.warn('[restoreImages]', err); }
  updateCount();
}

async function restoreState() {
  try {
    const raw = localStorage.getItem(LS_STATE);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.material)  document.getElementById('material').value   = s.material;
      if (s.detail)    document.getElementById('detail').value     = s.detail;
      if (s.color)     document.getElementById('color-text').value = s.color;
      (s.detailRefs || []).forEach((val, i) => {
        const el = document.getElementById(`detail-ref-${i + 1}`);
        if (el && val) el.value = val;
      });
      if (Array.isArray(s.extras)) {
        const cbs = [...document.querySelectorAll('.extra-opt')];
        s.extras.forEach((checked, i) => { if (cbs[i]) cbs[i].checked = checked; });
      }
      if (s.prompt) {
        document.getElementById('prompt-output').value = s.prompt;
        setCopyEnabled(true);
      }
    }
  } catch (_) {}

  await restoreImages();
  localStorage.removeItem('ppb_images'); // 구 localStorage 이미지 데이터 정리
}

/* 텍스트 필드 자동 저장 */
['material', 'detail', 'color-text', 'detail-ref-1', 'detail-ref-2', 'detail-ref-3', 'detail-ref-4']
  .forEach(id => { document.getElementById(id)?.addEventListener('input', debouncedSave); });

document.getElementById('custom-bg').addEventListener('input', debouncedSave);
document.querySelectorAll('.extra-opt').forEach(cb => cb.addEventListener('change', saveState));

restoreState();
</script>
